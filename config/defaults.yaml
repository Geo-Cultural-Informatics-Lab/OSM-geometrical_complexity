# ============================================================================
# OSM Complexity Analysis - System Defaults
# ============================================================================
# This file contains system-wide default values.
# DO NOT edit this file directly - it is version controlled.
#
# To customize your analysis:
# 1. Copy config/user_config.example.yaml to config/user_config.yaml
# 2. Edit user_config.yaml with your settings
# 3. Your settings will override these defaults
# ============================================================================

# Analysis Configuration
analysis:
  mode: snapshot  # Options: snapshot, time_series, batch_countries
  timestamp: "2025-11-01"  # Default timestamp for snapshot mode

# Analysis Options
analysis_options:
  filter: "type:way and building=*"  # OSM filter query
  chunked_threshold_km2: 5000  # Area threshold for spatial chunking (km²)
  include_building_count: true  # Count total buildings
  include_user_count: true  # Count unique contributors
  resume: true  # Resume interrupted analyses

# Output Settings
output:
  directory: ./results
  data_directory: ./data
  logs_directory: ./logs
  export_shapefile: false
  export_individual_buildings: false
  sample_complex_buildings: 10  # Number of complex buildings to sample

# Visualization Settings
visualization:
  create_dashboards: false
  create_time_series_plots: true
  create_user_correlation_plot: true
  create_box_plots: true
  create_qualitative_samples: true
  dpi: 300  # Plot resolution

  # Visualization merging options (for multi-region/country analyses)
  merge_visualizations: false  # If true, combine all regions into single plots
  # When merge_visualizations is false, creates separate plots per region AND a combined plot
  # When merge_visualizations is true, only creates combined plots (saves space)

  # Fine-grained control (overrides merge_visualizations if specified)
  merge_dashboards: null  # null = use merge_visualizations, true/false = override
  merge_time_series: null  # null = use merge_visualizations, true/false = override
  merge_correlation_plots: null  # null = use merge_visualizations, true/false = override

# Time Series Defaults (when mode: time_series)
time_series:
  start_year: 2015
  end_year: 2025
  interval: yearly  # Options: yearly, monthly, quarterly

# Country Analysis Defaults (when mode: batch_countries)
countries:
  source: list  # Options: list, csv
  iso_codes: []  # List of ISO country codes (e.g., ['DEU', 'GBR', 'FRA'])
  csv_path: ./countries_polygons/World_Countries.csv
  geojson_path: ./countries_polygons/World_Countries.geojson
  iso_filter: null  # null for all countries, or list of ISO codes to filter

  # Administrative subdivision settings
  subdivide_by_admin_level: false  # If true, analyze each admin subdivision separately
  admin_level: 6  # Administrative level for subdivision (4=province, 6=district, 8=sub-district)
  cache_boundaries: true  # Cache admin boundaries to avoid repeated API calls
  overpass_timeout: 120  # Timeout for Overpass API queries (seconds)

# Default Region Settings (used when no regions specified)
default_region:
  type: city  # Options: city, bbox, point
  radius_km: 15  # Default radius for city/point analysis

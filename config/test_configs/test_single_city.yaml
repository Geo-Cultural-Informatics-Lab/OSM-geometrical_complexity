# Quick test - Single city snapshot
# Run with: python main.py --config config_templates/test_single_city.yaml
# Expected time: 2-5 minutes

analysis:
  mode: snapshot
  timestamp: "2025-08-01"

regions:
  heidelberg_10km:
    type: city
    name: "Heidelberg, Germany"
    radius_km: 10

analysis_options:
  filter: "type:way and building=*"
  chunked_threshold_km2: 5000
  include_building_count: true
  include_user_count: true
  resume: true

output:
  directory: ./results/heidelberg_test
  export_shapefile: false

visualization:
  create_dashboards: true
  dpi: 300
